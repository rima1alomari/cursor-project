<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumenSlides Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --border: #e2e8f0;
        --accent: #2563eb;
        --text: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        min-height: 100vh;
        grid-template-rows: auto 1fr;
      }

      header {
        padding: 16px 24px;
        background: linear-gradient(90deg, rgba(16, 185, 129, 0.1), rgba(59, 130, 246, 0.1));
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
      }

      main {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 24px;
        padding: 24px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
      }

      .panel h2 {
        margin-top: 0;
        font-size: 18px;
      }

      .canvas-placeholder {
        min-height: 520px;
        border: 2px dashed rgba(37, 99, 235, 0.2);
        border-radius: 20px;
        display: grid;
        place-items: center;
        background: #ffffff;
      }

      .back-link {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <span>LumenSlides Editor (Placeholder)</span>
      </div>
      <a class="back-link" href="home.html">← Back to Home</a>
    </header>
    <main>
      <aside class="panel">
        <h2>Slides</h2>
        <p>This is a placeholder. Add slide thumbnails here.</p>
      </aside>
      <section class="panel canvas-placeholder">
        <p>Canvas area coming soon.</p>
      </section>
    </main>
  </body>
</html>
