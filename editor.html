<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumenSlides Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --border: #e2e8f0;
        --accent: #2563eb;
        --text: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        min-height: 100vh;
        grid-template-rows: auto 1fr;
      }

      header {
        padding: 16px 24px;
        background: linear-gradient(90deg, rgba(16, 185, 129, 0.1), rgba(59, 130, 246, 0.1));
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
      }

      main {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 24px;
        padding: 24px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
      }

      .panel h2 {
        margin-top: 0;
        font-size: 18px;
      }

      .canvas-placeholder {
        min-height: 520px;
        border: 2px dashed rgba(37, 99, 235, 0.2);
        border-radius: 20px;
        display: grid;
        place-items: center;
        background: #ffffff;
      }

      .back-link {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <span>LumenSlides Editor (Placeholder)</span>
      </div>
      <a class="back-link" href="home.html">← Back to Home</a>
    </header>
    <main>
      <aside class="panel">
        <h2>Slides</h2>
        <p>This is a placeholder. Add slide thumbnails here.</p>
      </aside>
      <section class="panel canvas-placeholder">
        <p>Canvas area coming soon.</p>
      </section>
    </main>
    
    <!-- Chatbot Component -->
    <div id="chatbot">
      <button id="chatbotToggle" aria-label="Open chatbot">
        <svg class="robot-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect class="robot-head" x="20" y="15" width="60" height="50" rx="8"/>
          <circle class="robot-eye" cx="35" cy="35" r="5"/>
          <circle class="robot-eye" cx="65" cy="35" r="5"/>
          <rect class="robot-body" x="25" y="70" width="50" height="25" rx="5"/>
          <rect x="30" y="75" width="15" height="8" rx="2" fill="#ffffff" opacity="0.6"/>
          <rect x="55" y="75" width="15" height="8" rx="2" fill="#ffffff" opacity="0.6"/>
        </svg>
      </button>
      <div id="chatbotWindow">
        <div class="chatbot-header">
          <div class="chatbot-header-left">
            <div>
              <h3 class="chatbot-header-title">🤖 AI Assistant</h3>
              <p class="chatbot-header-subtitle">How can I help you?</p>
            </div>
          </div>
          <div class="chatbot-header-actions">
            <button id="chatbotResize" class="chatbot-header-btn" aria-label="Expand" onclick="if(typeof window.toggleChatbotSize==='function'){window.toggleChatbotSize();}else{const w=document.getElementById('chatbotWindow');if(w){const e=w.classList.contains('expanded');w.style.setProperty('width',e?'380px':'1200px','important');w.style.setProperty('height',e?'500px':'1000px','important');w.classList.toggle('expanded');this.textContent=e?'⊞':'⊟';localStorage.setItem('chatbot_expanded',e?'false':'true');}}return false;">⊞</button>
            <button id="chatbotMinimize" class="chatbot-header-btn" aria-label="Minimize">−</button>
            <button id="chatbotClose" class="chatbot-header-btn" aria-label="Close">×</button>
          </div>
        </div>
        <div id="chatbotMessages"></div>
        <div class="chatbot-input-area">
          <div class="chatbot-input-wrapper">
            <textarea id="chatbotInput" placeholder="Type your message..." rows="1"></textarea>
          </div>
          <div class="chatbot-input-actions">
            <button id="chatbotVoice" class="chatbot-action-btn" aria-label="Voice input">
              <span class="voice-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <line x1="12" y1="19" x2="12" y2="23"></line>
                  <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
              </span>
            </button>
            <button id="chatbotSend" class="chatbot-action-btn" aria-label="Send message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Load config.js for API keys -->
    <script src="./config.js"></script>
    <script src="./scripts/chatbot.js"></script>
  </body>
</html>
