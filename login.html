<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-white bg-modern bg-corner-dots">
    <header class="site-header">
      <img class="site-logo site-logo--banner" src="./Screenshot 2025-11-06 at 1.14.39 PM.png" alt="Aramco Digital banner" onerror="this.remove(); var b=document.querySelector('.site-brand'); if(b){ b.textContent='Aramco Digital'; }" />
      <span class="site-brand"></span>
      <img class="site-logo site-logo--mark" src="./logo.png" alt="Aramco Digital logo" onerror="this.remove();" />
    </header>
    <main class="center-wrapper center-wrapper--top">
      <div class="card card--auth">
        <div class="logo-circle" aria-hidden="true">
          <span class="logo-dot logo-dot--green"></span>
          <span class="logo-dot logo-dot--blue"></span>
        </div>
        <h1 class="title">Sign in</h1>
        <p class="subtitle">Welcome back. Please enter your details.</p>
        <form class="form" id="login-form">
          <div class="field">
            <label class="label" for="email">Email</label>
            <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label class="label" for="password">Password</label>
            <input class="input" id="password" name="password" type="password" placeholder="••••••••" required />
          </div>
          <label class="remember">
            <input class="remember__checkbox" id="remember" name="remember" type="checkbox" />
            <span class="remember__text">Remember me</span>
          </label>
          <div class="row row--actions">
            <button class="btn btn-primary" type="submit">Sign in</button>
            <a class="btn btn-outline" href="./index.html">Back</a>
          </div>
        </form>
        <p class="footer-hint">No account yet? Use any email and password to continue.</p>
      </div>
    </main>
    <footer class="credits">Made by: Reema Alomari, Abdullah Alqahtani, Yara AlSardi</footer>
    <script src="./scripts/login.js"></script>
  </body>
  </html>
