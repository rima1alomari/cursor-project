<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
    <script src="./scripts/global.js"></script>
  </head>
  <body class="bg-white bg-modern bg-corner-dots">
    <header class="site-header">
      <div class="header-left">
        <img class="site-logo site-logo--banner" src="./lumen-logo.png" alt="LumenSlides logo" />
        <a href="./index.html" class="home-icon-link" title="Home" data-no-fade>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </a>
      </div>
    </header>
    <main class="center-wrapper center-wrapper--top page-fade-in">
      <div class="card card--auth animate-entrance">
        <div class="logo-circle animate-fade-in animate-delay-1" aria-hidden="true">
          <span class="logo-dot logo-dot--green"></span>
          <span class="logo-dot logo-dot--blue"></span>
        </div>
        <h1 class="title animate-fade-in animate-delay-2">Log in</h1>
        <p class="subtitle animate-fade-in animate-delay-2">Welcome back. Please enter your details.</p>
        <form class="form animate-fade-in animate-delay-3" id="login-form">
          <div class="field">
            <label class="label" for="identifier">Email or Username</label>
            <input class="input" id="identifier" name="identifier" type="text" placeholder="you@example.com or username" required />
          </div>
          <div class="field">
            <label class="label" for="password">Password</label>
            <input class="input" id="password" name="password" type="password" placeholder="••••••••" required />
          </div>
          <label class="remember">
            <input class="remember__checkbox" id="remember" name="remember" type="checkbox" />
            <span class="remember__text">Remember me</span>
          </label>
          <div id="loginError" class="error-message" style="display: none;"></div>
          <div class="row row--actions">
            <button class="btn btn-primary" type="submit">Log in</button>
            <a class="btn btn-outline" href="./index.html" data-no-fade>Back</a>
          </div>
        </form>
        <p class="footer-hint">No account yet? <a href="./signup.html" style="color: var(--blue-700); text-decoration: none;">Sign up</a> to create one.</p>
        <div id="alreadyLoggedInNotice" class="notice-banner" style="display: none;">
          <span>You're already signed in as <strong id="loggedInUsername"></strong></span>
          <a href="./home.html">Go to Home</a>
          <button class="notice-banner-close" onclick="this.parentElement.style.display='none'">×</button>
        </div>
      </div>
    </main>
    <footer class="credits">Made by: Reema Alomari, Abdullah Alqahtani, Yara AlSardi</footer>
    <script src="./scripts/auth.js"></script>
    <script src="./scripts/login.js"></script>
    <script>
      // Edge case: If already logged in, show notice
      (function() {
        const currentUser = getCurrentUser();
        if (currentUser) {
          const notice = document.getElementById('alreadyLoggedInNotice');
          const usernameSpan = document.getElementById('loggedInUsername');
          if (notice && usernameSpan) {
            usernameSpan.textContent = currentUser.username;
            notice.style.display = 'flex';
          }
        }
        
        // Check for notice from signup redirect
        const urlParams = new URLSearchParams(window.location.search);
        const noticeParam = urlParams.get('notice');
        if (noticeParam) {
          const banner = document.createElement('div');
          banner.className = 'notice-banner';
          banner.style.position = 'relative';
          banner.style.top = '0';
          banner.style.left = '0';
          banner.style.transform = 'none';
          banner.style.marginTop = '16px';
          banner.innerHTML = `
            <span>${decodeURIComponent(noticeParam)}</span>
            <button class="notice-banner-close" onclick="this.parentElement.remove()">×</button>
          `;
          const card = document.querySelector('.card--auth');
          if (card) {
            card.insertBefore(banner, card.firstChild);
            setTimeout(() => banner.remove(), 5000);
          }
        }
      })();
    </script>
    
    <!-- Chatbot Component -->
    <div id="chatbot">
      <button id="chatbotToggle" aria-label="Open chatbot">
        <svg class="robot-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect class="robot-head" x="20" y="15" width="60" height="50" rx="8"/>
          <circle class="robot-eye" cx="35" cy="35" r="5"/>
          <circle class="robot-eye" cx="65" cy="35" r="5"/>
          <rect class="robot-body" x="25" y="70" width="50" height="25" rx="5"/>
          <rect x="30" y="75" width="15" height="8" rx="2" fill="#ffffff" opacity="0.6"/>
          <rect x="55" y="75" width="15" height="8" rx="2" fill="#ffffff" opacity="0.6"/>
        </svg>
      </button>
      <div id="chatbotWindow">
        <div class="chatbot-header">
          <div class="chatbot-header-left">
            <div>
              <h3 class="chatbot-header-title">🤖 AI Assistant</h3>
              <p class="chatbot-header-subtitle">How can I help you?</p>
            </div>
          </div>
          <div class="chatbot-header-actions">
            <button id="chatbotResize" class="chatbot-header-btn" aria-label="Expand" onclick="
              const win = document.getElementById('chatbotWindow');
              if (win) {
                const isExp = win.classList.contains('expanded');
                if (isExp) {
                  win.style.width = '380px';
                  win.style.height = '500px';
                  win.classList.remove('expanded');
                  this.textContent = '⊞';
                } else {
                  win.style.width = '800px';
                  win.style.height = '900px';
                  win.classList.add('expanded');
                  this.textContent = '⊟';
                }
                localStorage.setItem('chatbot_expanded', !isExp ? 'true' : 'false');
              }
              return false;
            ">⊞</button>
            <button id="chatbotMinimize" class="chatbot-header-btn" aria-label="Minimize">−</button>
            <button id="chatbotClose" class="chatbot-header-btn" aria-label="Close">×</button>
          </div>
        </div>
        <div id="chatbotMessages"></div>
        <div class="chatbot-input-area">
          <div class="chatbot-input-wrapper">
            <textarea id="chatbotInput" placeholder="Type your message..." rows="1"></textarea>
          </div>
          <div class="chatbot-input-actions">
            <button id="chatbotVoice" class="chatbot-action-btn" aria-label="Voice input">
              <span class="voice-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <line x1="12" y1="19" x2="12" y2="23"></line>
                  <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
              </span>
            </button>
            <button id="chatbotSend" class="chatbot-action-btn" aria-label="Send message">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Load config.js for API keys -->
    <script src="./config.js"></script>
    <script src="./scripts/chatbot.js"></script>
  </body>
  </html>
