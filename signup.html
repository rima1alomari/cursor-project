<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
    <script src="./scripts/global.js"></script>
  </head>
  <body class="bg-white bg-modern bg-corner-dots">
    <header class="site-header">
      <div class="header-left">
        <img class="site-logo site-logo--banner" src="Screenshot 2025-11-06 at 1.14.39 PM.png" alt="LumenSlides logo" />
        <a href="./index.html" class="home-icon-link" title="Home">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </a>
      </div>
    </header>
    <main class="center-wrapper center-wrapper--top page-fade-in">
      <div class="card card--auth animate-entrance">
        <div class="logo-circle animate-fade-in animate-delay-1" aria-hidden="true">
          <span class="logo-dot logo-dot--green"></span>
          <span class="logo-dot logo-dot--blue"></span>
        </div>
        <h1 class="title animate-fade-in animate-delay-2">Sign up</h1>
        <p class="subtitle animate-fade-in animate-delay-2">Create your account to get started.</p>
        <form class="form animate-fade-in animate-delay-3" id="signup-form">
          <div class="field">
            <label class="label" for="username">Username</label>
            <input class="input" id="username" name="username" type="text" placeholder="username" required />
          </div>
          <div class="field">
            <label class="label" for="email">Email</label>
            <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label class="label" for="password">Password</label>
            <input class="input" id="password" name="password" type="password" placeholder="••••••••" required />
          </div>
          <div id="signupError" class="error-message" style="display: none;"></div>
          <div class="row row--actions">
            <button class="btn btn-primary" type="submit">Create Account</button>
            <a class="btn btn-outline" href="./index.html">Back</a>
          </div>
        </form>
        <p class="footer-hint">Already have an account? <a href="./login.html" style="color: var(--blue-700); text-decoration: none;">Log in</a></p>
        <div id="alreadyLoggedInNotice" class="notice-banner" style="display: none;">
          <span>You're already signed in as <strong id="loggedInUsername"></strong></span>
          <a href="./home.html">Go to Home</a>
          <button class="notice-banner-close" onclick="this.parentElement.style.display='none'">×</button>
        </div>
      </div>
    </main>
    <footer class="credits">Made by: Reema Alomari, Abdullah Alqahtani, Yara AlSardi</footer>
    <script src="./scripts/auth.js"></script>
    <script>
      // Edge case: If already logged in, show notice
      (function() {
        const currentUser = getCurrentUser();
        if (currentUser) {
          const notice = document.getElementById('alreadyLoggedInNotice');
          const usernameSpan = document.getElementById('loggedInUsername');
          if (notice && usernameSpan) {
            usernameSpan.textContent = currentUser.username;
            notice.style.display = 'flex';
          }
        }
      })();
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const signupForm = document.getElementById("signup-form");
        if (!signupForm) return;

        const errorDiv = document.getElementById("signupError");

        signupForm.addEventListener("submit", (event) => {
          event.preventDefault();
          
          const username = document.getElementById("username").value.trim();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          if (!username || !email || !password) {
            showError("Please fill in all fields.");
            return;
          }

          if (password.length < 4) {
            showError("Password must be at least 4 characters long.");
            return;
          }

          const result = registerAccount(username, email, password);

          if (result.success) {
            // Don't auto-login, redirect to login with notice
            const notice = encodeURIComponent("Account created. Please log in.");
            const redirectUrl = `./login.html?notice=${notice}`;
            if (window.fadeNavigate) {
              window.fadeNavigate(redirectUrl);
            } else {
              window.location.href = redirectUrl;
            }
          } else {
            showError(result.error || "Failed to create account. Please try again.");
          }
        });

        function showError(message) {
          if (errorDiv) {
            errorDiv.textContent = message;
            errorDiv.style.display = "block";
            // Smooth fade-in animation
            errorDiv.style.opacity = "0";
            setTimeout(() => {
              errorDiv.style.transition = "opacity 0.3s ease";
              errorDiv.style.opacity = "1";
            }, 10);
          }
        }
      });
    </script>
  </body>
</html>
