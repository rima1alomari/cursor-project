<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VisionSlider - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="home_styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <img src="assets/LumenSlides.jpg" alt="Lumen Slides" class="app-logo" />

        <div class="profile-container">
          <button class="profile-button" aria-haspopup="true" aria-expanded="false">
            <img src="profile-placeholder.png" alt="Profile picture" class="profile-img" />
          </button>

          <div class="profile-menu">
            <button class="profile-menu-item" id="settingsTrigger">Settings</button>
            <button class="profile-menu-item">Logout</button>
          </div>
        </div>
      </div>

      <div class="topbar-right">
        <img src="assets/logo.png" alt="Company logo" class="company-logo" />
      </div>
    </header>

    <main class="main-layout">
      <section class="center-section">
        <div class="plus-container" id="plusContainer">
          <button class="plus-button" id="plusButton" aria-expanded="false">+</button>

          <button class="template-btn template-top" data-template="blank">
            Blank<br />Template
          </button>
          <button class="template-btn template-left" data-template="business">
            Business<br />Template
          </button>
          <button class="template-btn template-right" data-template="education">
            Education<br />Template
          </button>
        </div>
      </section>

      <section class="recent-section">
        <div class="recent-inner">
          <h2>Recently Opened Projects</h2>
          <p class="recent-empty">
            No recent projects yet. Save a project in the editor to see it appear here.
          </p>
        </div>
      </section>
    </main>

    <!-- Settings popup -->
    <div class="settings-overlay" id="settingsOverlay">
      <div class="settings-modal">
        <h2>Settings</h2>
        <p class="settings-subtitle">This is a simple placeholder. You can later connect:</p>
        <ul class="settings-list">
          <li>Profile info</li>
          <li>Language preference (EN / AR)</li>
          <li>Account options</li>
        </ul>
        <button class="close-settings" id="closeSettingsBtn">Close</button>
      </div>
    </div>

    <!-- ✅ Script goes here -->
    <script src="home_scripts.js"></script>
  </body>
</html>
