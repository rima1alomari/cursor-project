<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LumenSlides · Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="./scripts/global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    .projects-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 80px;
      min-height: calc(100vh - 200px);
    }
    .projects-header {
      margin-bottom: 24px;
    }
    .projects-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1e293b;
      margin: 0;
    }
    .projects-controls {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 32px;
      width: 100%;
      max-width: 1200px;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
      margin-right: auto;
    }
    .search-box input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .search-box input:focus {
      outline: none;
      border-color: #004c97;
    }
    .search-box svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: #64748b;
    }
    .sort-dropdown {
      padding: 0.75rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      background: white;
      cursor: pointer;
      transition: border-color 0.2s;
      min-width: 180px;
      margin-left: 80px;
    }
    .sort-dropdown:focus {
      outline: none;
      border-color: #004c97;
    }
    .btn-new-project {
      background: linear-gradient(90deg, #10b981, #3b82f6);
      background-size: 200% 100%;
      color: #ffffff;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background-position 0.3s ease, filter 0.25s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: auto;
      position: relative;
      overflow: hidden;
    }
    .btn-new-project:hover {
      background-position: 100% 0;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    .btn-new-project:active {
      transform: translateY(0) scale(0.98);
    }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 28px;
      margin-bottom: 2rem;
      width: 100%;
      justify-items: center;
    }
    .project-card {
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      width: 260px;
    }
    .project-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
    }
    .project-thumbnail {
      width: 100%;
      height: 160px;
      border-radius: 12px;
      object-fit: cover;
      margin-bottom: 1rem;
      display: block;
    }
    .project-thumbnail.fallback {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2.5rem;
      font-weight: 700;
      position: relative;
      overflow: hidden;
    }
    .project-thumbnail.fallback::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
    }
    .project-info {
      flex: 1;
    }
    .project-title {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
      margin-top: 12px;
      margin-bottom: 0.5rem;
      word-break: break-word;
      line-height: 1.4;
    }
    .project-meta {
      font-size: 13px;
      color: #666;
      margin-bottom: 0;
    }
    .project-actions {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 5;
    }
    .project-menu-btn {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      border: none;
      padding: 0.5rem;
      cursor: pointer;
      border-radius: 6px;
      color: rgba(0, 0, 0, 0.45);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      width: 32px;
      height: 32px;
      opacity: 0;
    }
    .project-card:hover .project-menu-btn {
      opacity: 1;
    }
    .project-menu-btn:hover {
      background: rgba(255, 255, 255, 1);
      color: rgba(0, 0, 0, 0.7);
    }
    .project-menu {
      position: absolute;
      top: 36px;
      right: 10px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      padding: 8px 0;
      min-width: 160px;
      z-index: 10;
      display: none;
    }
    .project-menu.active {
      display: block;
    }
    .project-menu-btn:focus + .project-menu,
    .project-menu:hover {
      display: block;
    }
    .project-menu-item {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      background: none;
      text-align: left;
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.875rem;
      color: #475569;
      transition: background 0.2s;
    }
    .project-menu-item:hover {
      background: #f1f5f9;
    }
    .project-menu-item.delete,
    .project-menu-item.danger {
      color: #ef4444;
    }
    .project-menu-item.delete:hover,
    .project-menu-item.danger:hover {
      background: #fee2e2;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #64748b;
      width: 100%;
    }
    .empty-state h2 {
      font-size: 1.5rem;
      color: #1e293b;
      margin-bottom: 0.5rem;
    }
    .empty-state p {
      margin-bottom: 1.5rem;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      margin: 0;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #64748b;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .modal-close:hover {
      background: #f1f5f9;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }
    .form-input {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #004c97;
    }
    .modal-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 2rem;
    }
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background-position 0.3s ease, filter 0.25s ease, background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
    }
    .btn-primary {
      background: linear-gradient(90deg, #10b981, #3b82f6);
      background-size: 200% 100%;
      color: #ffffff;
      position: relative;
      overflow: hidden;
    }
    .btn-primary:hover {
      background-position: 100% 0;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    .btn-primary:active {
      transform: translateY(0) scale(0.98);
    }
    .btn-outline {
      background: white;
      color: #475569;
      border: 2px solid #e2e8f0;
    }
    .btn-outline:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    @media (max-width: 1024px) {
      .projects-container {
        padding: 40px 60px;
      }
      .projects-grid {
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 24px;
      }
    }
    @media (max-width: 768px) {
      .projects-container {
        padding: 30px 40px;
      }
      .projects-header h1 {
        font-size: 24px;
      }
      .projects-controls {
        flex-direction: column;
        width: 100%;
        gap: 12px;
      }
      .search-box,
      .sort-dropdown {
        width: 100%;
      }
      .projects-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .btn-new-project {
        width: 100%;
        justify-content: center;
        margin-left: 0;
      }
      .project-card {
        width: 100%;
        max-width: 100%;
      }
    }
    @media (max-width: 480px) {
      .projects-container {
        padding: 24px 24px;
      }
      .projects-header h1 {
        font-size: 22px;
        margin-bottom: 20px;
      }
      .projects-controls {
        margin-top: 8px;
        margin-bottom: 24px;
      }
    }
  </style>
</head>

  <script>
    const PRESENTATIONS_INDEX_KEY = 'lumen-presentations-index';
    const PRESENTATION_STORAGE_PREFIX = 'lumen-presentation-';
    let allProjects = [];
    let filteredProjects = [];
    let currentProjectId = null;

    // Check if user is logged in
    const currentUser = getCurrentUser();
    if (!currentUser) {
      window.location.href = './login.html';
    }

    // Generate thumbnail from first slide
    async function generateThumbnailFromSlide(projectId) {
      try {
        const projectDataKey = PRESENTATION_STORAGE_PREFIX + projectId;
        const projectDataRaw = localStorage.getItem(projectDataKey);
        if (!projectDataRaw) return null;
        
        const projectData = JSON.parse(projectDataRaw);
        if (!projectData.slides || !Array.isArray(projectData.slides) || projectData.slides.length === 0) {
          return null;
        }
        
        const firstSlide = projectData.slides[0];
        if (!firstSlide) return null;
        
        // Create a temporary container to render the slide
        const tempContainer = document.createElement('div');
        tempContainer.style.position = 'fixed';
        tempContainer.style.top = '-10000px';
        tempContainer.style.left = '-10000px';
        tempContainer.style.width = '1280px';
        tempContainer.style.height = '720px';
        tempContainer.style.backgroundColor = firstSlide.backgroundColor || '#ffffff';
        tempContainer.style.overflow = 'hidden';
        tempContainer.style.transform = 'scale(0.25)';
        tempContainer.style.transformOrigin = 'top left';
        document.body.appendChild(tempContainer);
        
        // Render slide background
        if (firstSlide.backgroundImage) {
          const bgImg = document.createElement('img');
          bgImg.src = firstSlide.backgroundImage;
          bgImg.style.width = '100%';
          bgImg.style.height = '100%';
          bgImg.style.objectFit = 'cover';
          bgImg.style.position = 'absolute';
          bgImg.style.top = '0';
          bgImg.style.left = '0';
          tempContainer.appendChild(bgImg);
        }
        
        // Render slide elements
        if (firstSlide.elements && Array.isArray(firstSlide.elements)) {
          const imagePromises = [];
          
          firstSlide.elements.forEach(el => {
            if (el.type === 'text') {
              const textDiv = document.createElement('div');
              textDiv.style.position = 'absolute';
              textDiv.style.left = (el.left || 0) + 'px';
              textDiv.style.top = (el.top || 0) + 'px';
              textDiv.style.width = (el.width || 400) + 'px';
              textDiv.style.height = (el.height || 100) + 'px';
              textDiv.style.color = el.color || '#000000';
              textDiv.style.fontSize = (el.fontSize || 24) + 'px';
              textDiv.style.fontFamily = el.fontFamily || 'Inter, sans-serif';
              textDiv.style.fontWeight = el.fontWeight || 'normal';
              textDiv.style.textAlign = el.textAlign || 'left';
              textDiv.style.padding = '10px';
              textDiv.style.boxSizing = 'border-box';
              textDiv.style.whiteSpace = 'pre-wrap';
              textDiv.style.wordWrap = 'break-word';
              textDiv.textContent = el.text || '';
              if (el.backgroundColor) {
                textDiv.style.backgroundColor = el.backgroundColor;
              }
              tempContainer.appendChild(textDiv);
            } else if (el.type === 'image' && el.src) {
              const img = document.createElement('img');
              img.crossOrigin = 'anonymous';
              img.style.position = 'absolute';
              img.style.left = (el.left || 0) + 'px';
              img.style.top = (el.top || 0) + 'px';
              img.style.width = (el.width || 200) + 'px';
              img.style.height = (el.height || 200) + 'px';
              img.style.objectFit = 'cover';
              tempContainer.appendChild(img);
              
              // Wait for image to load
              const imgPromise = new Promise((resolve) => {
                if (img.complete) {
                  resolve();
                } else {
                  img.onload = resolve;
                  img.onerror = resolve;
                }
              });
              imagePromises.push(imgPromise);
              img.src = el.src;
            } else if (el.type === 'shape') {
              const shapeDiv = document.createElement('div');
              shapeDiv.style.position = 'absolute';
              shapeDiv.style.left = (el.left || 0) + 'px';
              shapeDiv.style.top = (el.top || 0) + 'px';
              shapeDiv.style.width = (el.width || 100) + 'px';
              shapeDiv.style.height = (el.height || 100) + 'px';
              shapeDiv.style.backgroundColor = el.fill || '#004c97';
              shapeDiv.style.borderRadius = el.shape === 'circle' ? '50%' : '8px';
              tempContainer.appendChild(shapeDiv);
            } else if (el.type === 'chart') {
              // For charts, create a placeholder div with chart info
              const chartDiv = document.createElement('div');
              chartDiv.style.position = 'absolute';
              chartDiv.style.left = (el.left || 0) + 'px';
              chartDiv.style.top = (el.top || 0) + 'px';
              chartDiv.style.width = (el.width || 400) + 'px';
              chartDiv.style.height = (el.height || 300) + 'px';
              chartDiv.style.backgroundColor = '#f8fafc';
              chartDiv.style.border = '2px solid #e2e8f0';
              chartDiv.style.borderRadius = '8px';
              chartDiv.style.display = 'flex';
              chartDiv.style.alignItems = 'center';
              chartDiv.style.justifyContent = 'center';
              chartDiv.style.fontSize = '14px';
              chartDiv.style.color = '#64748b';
              chartDiv.textContent = '📊 Chart';
              tempContainer.appendChild(chartDiv);
            }
          });
          
          // Wait for all images to load
          await Promise.all(imagePromises);
        }
        
        // Additional delay to ensure everything is rendered
        await new Promise(resolve => setTimeout(resolve, 300));
        
        // Capture with html2canvas
        if (typeof html2canvas !== 'undefined') {
          const canvas = await html2canvas(tempContainer, {
            scale: 0.25,
            backgroundColor: firstSlide.backgroundColor || '#ffffff',
            logging: false,
            useCORS: true,
            allowTaint: true,
            width: 1280,
            height: 720,
            windowWidth: 1280,
            windowHeight: 720
          });
          
          const thumbnailDataUrl = canvas.toDataURL('image/png');
          document.body.removeChild(tempContainer);
          
          // Update project data with thumbnail
          projectData.thumbnail = thumbnailDataUrl;
          localStorage.setItem(projectDataKey, JSON.stringify(projectData));
          
          // Update index
          const index = allProjects;
          const projectIndex = index.findIndex(p => p.id === projectId);
          if (projectIndex >= 0) {
            index[projectIndex].thumbnail = thumbnailDataUrl;
            localStorage.setItem(PRESENTATIONS_INDEX_KEY, JSON.stringify(index));
          }
          
          return thumbnailDataUrl;
        }
        
        document.body.removeChild(tempContainer);
        return null;
      } catch (err) {
        console.error('Failed to generate thumbnail for project', projectId, err);
        return null;
      }
    }

    // Load projects
    function loadProjects() {
      try {
        const raw = localStorage.getItem(PRESENTATIONS_INDEX_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        allProjects = Array.isArray(parsed) ? parsed.filter(p => p && p.id) : [];
        filteredProjects = [...allProjects];
        // Debug log to verify all projects are loaded
        console.log("Loaded projects:", allProjects);
        renderProjects();
        
        // Generate thumbnails for projects that don't have them
        allProjects.forEach(async (project) => {
          const hasThumbnail = project.thumbnail && typeof project.thumbnail === 'string' && project.thumbnail.startsWith('data:image');
          if (!hasThumbnail) {
            const thumbnail = await generateThumbnailFromSlide(project.id);
            if (thumbnail) {
              // Re-render to show the new thumbnail
              renderProjects();
            }
          }
        });
      } catch (err) {
        console.error('Failed to load projects', err);
        allProjects = [];
        filteredProjects = [];
        renderProjects();
      }
    }

    // Render projects
    function renderProjects() {
      const grid = document.getElementById('projectsGrid');
      const emptyState = document.getElementById('emptyState');

      if (filteredProjects.length === 0) {
        grid.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      grid.innerHTML = filteredProjects.map(project => {
        const updatedDate = project.updatedAt ? new Date(project.updatedAt) : new Date(project.createdAt || Date.now());
        const dateStr = formatDate(updatedDate);
        
        // Get thumbnail - check for image data URL first, then fallback to initials
        const hasThumbnail = project.thumbnail && typeof project.thumbnail === 'string' && project.thumbnail.startsWith('data:image');
        const initials = project.preview?.title?.charAt(0) || project.name?.charAt(0) || 'P';
        
        const thumbnailHTML = hasThumbnail
          ? `<img src="${escapeHtml(project.thumbnail)}" alt="Project preview" class="project-thumbnail" />`
          : `<div class="project-thumbnail fallback">${escapeHtml(initials)}</div>`;
        
        return `
          <div class="project-card" data-project-id="${project.id}">
            ${thumbnailHTML}
            <div class="project-info">
              <div class="project-title">${escapeHtml(project.name || 'Untitled')}</div>
              <div class="project-meta">Last edited: ${dateStr}</div>
            </div>
            <div class="project-actions">
              <button class="project-menu-btn" data-project-id="${project.id}" onclick="event.stopPropagation(); toggleProjectMenu('${project.id}')" aria-label="More actions">
                ⋮
              </button>
              <div class="project-menu" id="menu-${project.id}">
                <button class="project-menu-item" onclick="event.stopPropagation(); renameProject('${project.id}')">Rename Project</button>
                <button class="project-menu-item" onclick="event.stopPropagation(); duplicateProject('${project.id}')">Duplicate Project</button>
                <button class="project-menu-item delete" onclick="event.stopPropagation(); deleteProject('${project.id}')">Delete Project</button>
              </div>
            </div>
          </div>
        `;
      }).join('');

      // Add click handlers for cards
      grid.querySelectorAll('.project-card').forEach(card => {
        const projectId = card.dataset.projectId;
        card.addEventListener('click', (e) => {
          // Don't open if clicking on menu or menu button
          if (e.target.closest('.project-menu') || e.target.closest('.project-menu-btn') || e.target.closest('.project-actions')) {
            return;
          }
          openProject(projectId);
        });
      });
      
      // Close menus when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.project-menu') && !e.target.closest('.project-menu-btn')) {
          document.querySelectorAll('.project-menu').forEach(menu => {
            menu.classList.remove('active');
          });
        }
      });
    }

    // Toggle project menu
    function toggleProjectMenu(projectId) {
      // Close all menus
      document.querySelectorAll('.project-menu').forEach(menu => {
        menu.classList.remove('active');
      });
      // Toggle current menu
      const menu = document.getElementById(`menu-${projectId}`);
      if (menu) {
        menu.classList.toggle('active');
      }
      // Close menu when clicking outside
      setTimeout(() => {
        document.addEventListener('click', function closeMenu(e) {
          if (!e.target.closest('.project-menu') && !e.target.closest('.project-menu-btn')) {
            document.querySelectorAll('.project-menu').forEach(m => m.classList.remove('active'));
            document.removeEventListener('click', closeMenu);
          }
        });
      }, 0);
    }

    // Open project
    function openProject(projectId) {
      window.location.href = `slide-editor.html?id=${encodeURIComponent(projectId)}`;
    }

    // Rename project
    function renameProject(projectId) {
      const project = allProjects.find(p => p.id === projectId);
      if (!project) return;

      currentProjectId = projectId;
      document.getElementById('renameInput').value = project.name || 'Untitled';
      document.getElementById('renameProjectModal').classList.add('active');
    }

    // Duplicate project
    function duplicateProject(projectId) {
      try {
        const project = allProjects.find(p => p.id === projectId);
        if (!project) return;

        // Load full project data
        const projectDataKey = PRESENTATION_STORAGE_PREFIX + projectId;
        const projectDataRaw = localStorage.getItem(projectDataKey);
        if (!projectDataRaw) {
          alert('Failed to load project data');
          return;
        }

        const projectData = JSON.parse(projectDataRaw);
        const newProjectId = crypto.randomUUID ? crypto.randomUUID() : `project-${Date.now()}-${Math.random().toString(36).slice(2)}`;
        const newProjectName = `${project.name || 'Untitled'} (Copy)`;

        // Create duplicate
        const duplicateData = {
          ...projectData,
          id: newProjectId,
          name: newProjectName,
          createdAt: Date.now(),
          updatedAt: Date.now()
        };

        // Save duplicate
        localStorage.setItem(PRESENTATION_STORAGE_PREFIX + newProjectId, JSON.stringify(duplicateData));

        // Add to index
        const index = allProjects;
        index.push({
          id: newProjectId,
          name: newProjectName,
          createdAt: Date.now(),
          updatedAt: Date.now(),
          preview: project.preview
        });

        localStorage.setItem(PRESENTATIONS_INDEX_KEY, JSON.stringify(index));
        loadProjects();
      } catch (err) {
        console.error('Failed to duplicate project', err);
        alert('Failed to duplicate project. Please try again.');
      }
    }

    // Delete project
    function deleteProject(projectId) {
      if (!confirm('Are you sure you want to delete this project? This action cannot be undone.')) {
        return;
      }

      try {
        // Remove from index
        const index = allProjects.filter(p => p.id !== projectId);
        localStorage.setItem(PRESENTATIONS_INDEX_KEY, JSON.stringify(index));

        // Remove project data
        localStorage.removeItem(PRESENTATION_STORAGE_PREFIX + projectId);

        loadProjects();
      } catch (err) {
        console.error('Failed to delete project', err);
        alert('Failed to delete project. Please try again.');
      }
    }

    // Search projects
    function searchProjects(query) {
      const lowerQuery = query.toLowerCase().trim();
      if (!lowerQuery) {
        filteredProjects = [...allProjects];
      } else {
        filteredProjects = allProjects.filter(project => {
          const name = (project.name || '').toLowerCase();
          return name.includes(lowerQuery);
        });
      }
      sortProjects();
    }

    // Sort projects
    function sortProjects() {
      const sortValue = document.getElementById('sortSelect').value;
      
      switch (sortValue) {
        case 'recent':
          filteredProjects.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
          break;
        case 'newest':
          filteredProjects.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
          break;
        case 'az':
          filteredProjects.sort((a, b) => {
            const nameA = (a.name || 'Untitled').toLowerCase();
            const nameB = (b.name || 'Untitled').toLowerCase();
            return nameA.localeCompare(nameB);
          });
          break;
        case 'za':
          filteredProjects.sort((a, b) => {
            const nameA = (a.name || 'Untitled').toLowerCase();
            const nameB = (b.name || 'Untitled').toLowerCase();
            return nameB.localeCompare(nameA);
          });
          break;
      }
      renderProjects();
    }

    // Format date
    function formatDate(date) {
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return date.toLocaleDateString();
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchProjects(e.target.value);
    });

    document.getElementById('sortSelect').addEventListener('change', () => {
      sortProjects();
    });

    // New project
    document.getElementById('newProjectBtn').addEventListener('click', () => {
      document.getElementById('newProjectModal').classList.add('active');
      document.getElementById('projectNameInput').value = '';
      setTimeout(() => document.getElementById('projectNameInput').focus(), 100);
    });

    document.getElementById('closeNewProjectModal').addEventListener('click', () => {
      document.getElementById('newProjectModal').classList.remove('active');
    });

    document.getElementById('cancelNewProject').addEventListener('click', () => {
      document.getElementById('newProjectModal').classList.remove('active');
    });

    document.getElementById('newProjectForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const projectName = document.getElementById('projectNameInput').value.trim();
      if (!projectName) return;

      // Create new project
      const newProjectId = crypto.randomUUID ? crypto.randomUUID() : `project-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      const now = Date.now();

      // Create project data
      const projectData = {
        id: newProjectId,
        name: projectName,
        slides: [{
          id: crypto.randomUUID ? crypto.randomUUID() : `slide-${Date.now()}`,
          title: 'Slide 1',
          elements: [],
          backgroundColor: '#ffffff'
        }],
        createdAt: now,
        updatedAt: now
      };

      // Save project
      localStorage.setItem(PRESENTATION_STORAGE_PREFIX + newProjectId, JSON.stringify(projectData));

      // Add to index
      const index = allProjects;
      index.push({
        id: newProjectId,
        name: projectName,
        createdAt: now,
        updatedAt: now
      });
      localStorage.setItem(PRESENTATIONS_INDEX_KEY, JSON.stringify(index));

      // Close modal and redirect
      document.getElementById('newProjectModal').classList.remove('active');
      window.location.href = `slide-editor.html?id=${encodeURIComponent(newProjectId)}`;
    });

    // Rename project
    document.getElementById('closeRenameModal').addEventListener('click', () => {
      document.getElementById('renameProjectModal').classList.remove('active');
    });

    document.getElementById('cancelRename').addEventListener('click', () => {
      document.getElementById('renameProjectModal').classList.remove('active');
    });

    document.getElementById('renameProjectForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const newName = document.getElementById('renameInput').value.trim();
      if (!newName || !currentProjectId) return;

      try {
        // Update in index
        const project = allProjects.find(p => p.id === currentProjectId);
        if (project) {
          project.name = newName;
          project.updatedAt = Date.now();
          localStorage.setItem(PRESENTATIONS_INDEX_KEY, JSON.stringify(allProjects));

          // Update in project data
          const projectDataKey = PRESENTATION_STORAGE_PREFIX + currentProjectId;
          const projectDataRaw = localStorage.getItem(projectDataKey);
          if (projectDataRaw) {
            const projectData = JSON.parse(projectDataRaw);
            projectData.name = newName;
            projectData.updatedAt = Date.now();
            localStorage.setItem(projectDataKey, JSON.stringify(projectData));
          }

          loadProjects();
          document.getElementById('renameProjectModal').classList.remove('active');
        }
      } catch (err) {
        console.error('Failed to rename project', err);
        alert('Failed to rename project. Please try again.');
      }
    });

    // Close modals on outside click
    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.remove('active');
        }
      });
    });

    // Initialize
    loadProjects();
  </script>
</body>
</html>
